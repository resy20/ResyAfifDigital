<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – Resy & Afif Wedding</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Cormorant+Garamond:wght@300;400;500&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --brown:    #4A2E10;
      --gold:     #C8972A;
      --gold-lt:  #E8C06A;
      --cream:    #FAF3E0;
      --ivory:    #FFF9F0;
      --red:      #C62828;
      --green:    #2E7D32;
      --blue:     #1565C0;
      --text:     #2C1A08;
      --muted:    #7A6A52;
      --border:   rgba(74,46,16,0.15);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Lato', sans-serif; background: var(--ivory); color: var(--text); min-height: 100vh; }

    header { background: var(--brown); border-bottom: 3px solid var(--gold); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .header-title { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--cream); }

    main { max-width: 1100px; margin: 0 auto; padding: 28px 20px; }

    /* Login Overlay */
    #login-overlay { position: fixed; inset: 0; background: var(--ivory); z-index: 1000; display: flex; align-items: center; justify-content: center; }
    .login-box { background: white; padding: 30px; border-radius: 12px; border: 1px solid var(--border); width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }

    /* Dashboard Stats - Sesuai Foto */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
    .stat-card { background: white; border: 1px solid var(--border); border-radius: 8px; padding: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
    .stat-num { font-family: 'Playfair Display', serif; font-size: 38px; color: var(--brown); line-height: 1; margin-bottom: 4px; }
    .stat-label { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

    /* Cards & Tables */
    .card { background: white; border: 1px solid var(--border); border-radius: 8px; padding: 24px; margin-bottom: 24px; }
    .card-title { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--brown); margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
    
    .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 12px; align-items: end; margin-bottom: 24px; }
    .form-input { padding: 10px 14px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; width: 100%; }
    
    .btn { padding: 10px 18px; border: none; border-radius: 6px; cursor: pointer; font-weight: 700; font-size: 13px; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; }
    .btn-brown { background: var(--brown); color: var(--cream); }
    .btn-gold { background: var(--gold); color: var(--brown); }
    .btn-red { background: var(--red); color: white; }
    .btn-green { background: var(--green); color: white; }

    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th { background: #F8F5F0; padding: 14px 10px; text-align: left; font-size: 11px; text-transform: uppercase; color: var(--brown); letter-spacing: 0.5px; }
    td { padding: 14px 10px; border-bottom: 1px solid var(--border); font-size: 14px; }

    .badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
    .badge-hadir { background: #E8F5E9; color: var(--green); }
    .badge-tidak { background: #FFEBEE; color: var(--red); }
    .badge-belum { background: #F5F5F5; color: #999; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<div id="login-overlay">
  <div class="login-box">
    <h2 style="font-family:'Playfair Display'; margin-bottom: 20px;">Admin Login</h2>
    <input type="email" id="login-email" class="form-input" placeholder="Email" style="margin-bottom:12px">
    <input type="password" id="login-password" class="form-input" placeholder="Password" style="margin-bottom:20px">
    <button class="btn btn-brown" style="width:100%; justify-content:center" onclick="handleLogin()">Masuk</button>
  </div>
</div>

<header>
  <div class="header-title">Admin – Resy & Afif Wedding</div>
  <button class="btn btn-red" onclick="handleLogout()">Logout</button>
</header>

<main>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-num" id="s-total">0</div><div class="stat-label">Total Tamu</div></div>
    <div class="stat-card"><div class="stat-num" id="s-hadir" style="color:var(--green)">0</div><div class="stat-label">Akan Hadir</div></div>
    <div class="stat-card"><div class="stat-num" id="s-tidak" style="color:var(--red)">0</div><div class="stat-label">Berhalangan</div></div>
    <div class="stat-card"><div class="stat-num" id="s-sent" style="color:var(--blue)">0</div><div class="stat-label">WA Terkirim</div></div>
  </div>

  <div class="card">
    <div class="card-title">
      <span>Daftar Tamu Undangan</span>
      <div style="display:flex; gap:8px">
        <input type="file" id="csv-file" accept=".csv" style="display:none" onchange="importCSV(event)">
        <button class="btn btn-gold" onclick="document.getElementById('csv-file').click()">⬆ Import CSV</button>
        <button class="btn btn-brown" onclick="exportCSV()">⬇ Export CSV</button>
      </div>
    </div>

    <div class="form-row">
      <div><label style="display:block; font-size:11px; margin-bottom:4px">NAMA TAMU</label><input type="text" id="in-name" class="form-input" placeholder="Nama Lengkap"></div>
      <div><label style="display:block; font-size:11px; margin-bottom:4px">WHATSAPP (62...)</label><input type="text" id="in-wa" class="form-input" placeholder="62812345678"></div>
      <div><label style="display:block; font-size:11px; margin-bottom:4px">KATEGORI</label><input type="text" id="in-note" class="form-input" placeholder="Keluarga/Teman"></div>
      <button class="btn btn-brown" onclick="addGuest()">Tambah</button>
    </div>

    <div style="overflow-x:auto">
      <table>
        <thead>
          <tr>
            <th>Nama Tamu</th>
            <th>Kategori</th>
            <th>RSVP Web</th>
            <th>Status WA</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody id="guest-list-body"></tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Konfirmasi RSVP (Supabase)</div>
    <div id="rsvp-realtime-list">Memuat data...</div>
  </div>
</main>

<script>
const SUPABASE_URL = 'https://bijessmsedrtfxbnieza.supabase.co';
const SUPABASE_KEY = 'sb_publishable_mmiBBx94Ri1-PjFQE6DyHQ_oElTvxJG';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let guests = JSON.parse(localStorage.getItem('wedding_guests') || '[]');
let waTemplate = "Halo {nama}, kami mengundang Anda ke acara pernikahan kami...";

// AUTH
async function handleLogin() {
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
  if (error) alert("Login Gagal: " + error.message);
  else { document.getElementById('login-overlay').classList.add('hidden'); init(); }
}

async function checkSession() {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (session) { document.getElementById('login-overlay').classList.add('hidden'); init(); }
}

function handleLogout() { supabaseClient.auth.signOut(); location.reload(); }

function init() {
  renderGuests();
  loadRsvpData();
}

// MANAGEMENT
function addGuest() {
  const name = document.getElementById('in-name').value;
  const wa = document.getElementById('in-wa').value;
  const note = document.getElementById('in-note').value;
  if (!name) return;
  guests.push({ id: Date.now(), name, wa, note, sent: false });
  saveAndRender();
  document.getElementById('in-name').value = ''; document.getElementById('in-wa').value = '';
}

function saveAndRender() {
  localStorage.setItem('wedding_guests', JSON.stringify(guests));
  renderGuests();
}

function renderGuests() {
  const body = document.getElementById('guest-list-body');
  body.innerHTML = guests.map(g => `
    <tr>
      <td><b>${g.name}</b></td>
      <td>${g.note || '-'}</td>
      <td id="rsvp-status-${g.name.replace(/\s/g, '')}"><span class="badge badge-belum">Belum Isi</span></td>
      <td>${g.sent ? '<span style="color:green">✓ Sent</span>' : '<span style="color:#999">Belum</span>'}</td>
      <td>
        <button class="btn btn-green" style="padding:4px 8px" onclick="sendWA('${g.name}', '${g.wa}', ${g.id})">Kirim WA</button>
        <button class="btn btn-red" style="padding:4px 8px" onclick="deleteGuest(${g.id})">Hapus</button>
      </td>
    </tr>
  `).join('');
  document.getElementById('s-total').textContent = guests.length;
  document.getElementById('s-sent').textContent = guests.filter(g => g.sent).length;
}

function sendWA(name, wa, id) {
  if (!wa) return alert("No WA kosong!");
  const msg = waTemplate.replace('{nama}', name);
  window.open(`https://wa.me/${wa}?text=${encodeURIComponent(msg)}`, '_blank');
  const idx = guests.findIndex(g => g.id === id);
  guests[idx].sent = true;
  saveAndRender();
}

function deleteGuest(id) {
  if(confirm('Hapus tamu?')) { guests = guests.filter(g => g.id !== id); saveAndRender(); }
}

// REALTIME RSVP
async function loadRsvpData() {
  const el = document.getElementById('rsvp-realtime-list');
  const { data, error } = await supabaseClient.from('rsvp').select('*').order('created_at', {ascending: false});
  if (error) return;

  el.innerHTML = data.map(r => `
    <div style="padding:12px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center">
      <div><b>${r.name}</b><br><small style="color:var(--muted)">${r.count} orang · "${r.message || '-'}"</small></div>
      <span class="badge ${r.status === 'hadir' ? 'badge-hadir' : 'badge-tidak'}">${r.status.toUpperCase()}</span>
    </div>
  `).join('');

  document.getElementById('s-hadir').textContent = data.filter(d => d.status === 'hadir').length;
  document.getElementById('s-tidak').textContent = data.filter(d => d.status === 'tidak').length;

  // Sync status ke tabel tamu
  data.forEach(r => {
    const statusEl = document.getElementById(`rsvp-status-${r.name.replace(/\s/g, '')}`);
    if (statusEl) statusEl.innerHTML = `<span class="badge ${r.status==='hadir'?'badge-hadir':'badge-tidak'}">${r.status}</span>`;
  });
}

// IMPORT / EXPORT
function importCSV(e) {
  const file = e.target.files[0];
  const reader = new FileReader();
  reader.onload = (evt) => {
    const lines = evt.target.result.split('\n');
    lines.slice(1).forEach((l, i) => {
      const c = l.split(',');
      if(c[0]) guests.push({ id: Date.now()+i, name: c[0].trim(), wa: c[1]?.trim(), note: c[2]?.trim(), sent: false });
    });
    saveAndRender();
  };
  reader.readAsText(file);
}

function exportCSV() {
  let csv = "Nama,WhatsApp,Kategori\n" + guests.map(g => `${g.name},${g.wa},${g.note}`).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'tamu_wedding.csv'; a.click();
}

checkSession();
</script>
</body>
</html>
