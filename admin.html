<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – Resy & Afif Wedding</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Cormorant+Garamond:wght@300;400;500&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* Styling tetap sama seperti sebelumnya */
    :root { --brown: #4A2E10; --gold: #C8972A; --gold-lt: #E8C06A; --cream: #FAF3E0; --ivory: #FFF9F0; --red: #C62828; --green: #2E7D32; --blue: #1565C0; --text: #2C1A08; --muted: #7A6A52; --border: rgba(74,46,16,0.15); }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Lato', sans-serif; background: var(--ivory); color: var(--text); min-height: 100vh; }
    header { background: var(--brown); border-bottom: 3px solid var(--gold); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
    .header-title { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--cream); }
    .admin-badge { background: var(--gold); color: var(--brown); font-size: 11px; font-weight: 700; padding: 4px 12px; border-radius: 20px; }
    main { max-width: 1100px; margin: 0 auto; padding: 28px 20px; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 28px; }
    .stat-card { background: white; border: 1px solid var(--border); border-radius: 8px; padding: 16px; text-align: center; }
    .stat-num { font-family: 'Playfair Display', serif; font-size: 36px; color: var(--brown); line-height: 1; }
    .card { background: white; border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 20px; }
    .card-title { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--brown); margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 10px; align-items: end; }
    .form-input { padding: 9px 12px; border: 1px solid var(--border); border-radius: 5px; width: 100%; }
    .btn { padding: 9px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: 700; }
    .btn-brown { background: var(--brown); color: var(--cream); }
    .btn-gold { background: var(--gold); color: var(--brown); }
    .btn-red { background: #e53935; color: white; }
    .tabs { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 20px; }
    .tab { padding: 10px 20px; cursor: pointer; border: none; background: none; color: var(--muted); }
    .tab.active { color: var(--brown); border-bottom: 2px solid var(--gold); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    #login-overlay { position: fixed; inset: 0; background: var(--ivory); z-index: 1000; display: flex; align-items: center; justify-content: center; }
    .login-box { background: white; padding: 30px; border-radius: 12px; border: 1px solid var(--border); width: 100%; max-width: 400px; text-align: center; }
    .hidden { display: none !important; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: var(--brown); color: white; padding: 10px; text-align: left; }
    td { padding: 10px; border-bottom: 1px solid var(--border); }
    .badge { padding: 3px 8px; border-radius: 10px; font-size: 11px; }
    .badge-hadir { background: #E8F5E9; color: green; }
    .badge-tidak { background: #FFEBEE; color: red; }
  </style>
</head>
<body>

<div id="login-overlay">
  <div class="login-box">
    <h2 style="font-family:'Playfair Display'; margin-bottom: 20px;">Admin Login</h2>
    <input type="email" id="login-email" class="form-input" placeholder="Email" style="margin-bottom: 10px;">
    <input type="password" id="login-password" class="form-input" placeholder="Password" style="margin-bottom: 20px;">
    <button class="btn btn-brown" style="width: 100%" onclick="handleLogin()">Masuk</button>
  </div>
</div>

<header>
  <div>
    <div class="header-title">Resy & Afif – Admin Panel</div>
  </div>
  <button class="btn btn-red" style="font-size: 11px;" onclick="handleLogout()">Logout</button>
</header>

<main>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-num" id="s-total">0</div><div>Total Tamu</div></div>
    <div class="stat-card"><div class="stat-num" id="s-hadir" style="color:green">0</div><div>Hadir</div></div>
    <div class="stat-card"><div class="stat-num" id="s-sent" style="color:blue">0</div><div>WA Terkirim</div></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('guests', this)">Daftar Tamu</button>
    <button class="tab" onclick="switchTab('rsvp', this)">Konfirmasi RSVP</button>
  </div>

  <div id="tab-guests" class="tab-content active">
    <div class="card">
      <div class="card-title">Manajemen Tamu</div>
      <div style="margin-bottom: 20px; display: flex; gap: 10px;">
        <input type="file" id="csv-file" accept=".csv" style="display:none" onchange="importCSV(event)">
        <button class="btn btn-gold" onclick="document.getElementById('csv-file').click()">⬆ Upload CSV</button>
        <button class="btn btn-brown" onclick="exportCSV()">⬇ Download Data</button>
      </div>
      <div style="overflow-x: auto;">
        <table>
          <thead>
            <tr>
              <th>Nama</th>
              <th>WhatsApp</th>
              <th>Status RSVP</th>
              <th>WA Sent</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="guest-list"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="tab-rsvp" class="tab-content">
    <div class="card">
      <div class="card-title">Real-time RSVP dari Database</div>
      <div id="rsvp-realtime-list">Memuat data...</div>
    </div>
  </div>
</main>

<script>
// KONFIGURASI SUPABASE
const SUPABASE_URL = 'https://bijessmsedrtfxbnieza.supabase.co';
const SUPABASE_KEY = 'sb_publishable_mmiBBx94Ri1-PjFQE6DyHQ_oElTvxJG';
const supabase = typeof supabase !== 'undefined' ? supabase : supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let guests = JSON.parse(localStorage.getItem('wedding_guests') || '[]');

// 1. FUNGSI LOGIN & SECURITY
async function handleLogin() {
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  
  const { data, error } = await supabase.auth.signInWithPassword({ email, password });
  
  if (error) {
    alert("Login Gagal: " + error.message);
  } else {
    document.getElementById('login-overlay').classList.add('hidden');
    loadRsvpData();
    renderGuests();
  }
}

async function handleLogout() {
  await supabase.auth.signOut();
  location.reload();
}

// Cek session saat halaman dimuat
async function checkSession() {
  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    document.getElementById('login-overlay').classList.add('hidden');
    loadRsvpData();
    renderGuests();
  }
}
checkSession();

// 2. FUNGSI RSVP (REAL DATABASE)
async function loadRsvpData() {
  const el = document.getElementById('rsvp-realtime-list');
  
  const { data, error } = await supabase
    .from('rsvp')
    .select('*')
    .order('created_at', { ascending: false });

  if (error) {
    el.innerHTML = "Error memuat data: " + error.message;
    return;
  }

  if (data.length === 0) {
    el.innerHTML = "Belum ada tamu yang mengisi RSVP.";
    return;
  }

  el.innerHTML = data.map(r => `
    <div style="padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between;">
      <div>
        <strong>${r.name}</strong> (${r.count} orang)<br>
        <small style="color: #666">"${r.message || '-'}"</small>
      </div>
      <span class="badge ${r.status === 'hadir' ? 'badge-hadir' : 'badge-tidak'}">${r.status.toUpperCase()}</span>
    </div>
  `).join('');
  
  // Update stats
  document.getElementById('s-hadir').textContent = data.filter(d => d.status === 'hadir').length;
}

// 3. FUNGSI IMPORT CSV
function importCSV(event) {
  const file = event.target.files[0];
  const reader = new FileReader();
  reader.onload = function(e) {
    const text = e.target.result;
    const lines = text.split('\n');
    const newGuests = [];
    
    // Asumsi CSV: Nama, No WA, Keterangan
    for(let i = 1; i < lines.length; i++) {
      const cols = lines[i].split(',');
      if(cols.length >= 2) {
        newGuests.push({
          id: Date.now() + i,
          name: cols[0].trim(),
          wa: cols[1].trim(),
          note: cols[2] ? cols[2].trim() : '',
          status: 'belum',
          sent: false
        });
      }
    }
    guests = [...guests, ...newGuests];
    saveGuests();
    renderGuests();
    alert(`Berhasil mengimpor ${newGuests.length} tamu.`);
  };
  reader.readAsText(file);
}

function saveGuests() {
  localStorage.setItem('wedding_guests', JSON.stringify(guests));
}

function renderGuests() {
  const list = document.getElementById('guest-list');
  list.innerHTML = guests.map(g => `
    <tr>
      <td>${g.name}</td>
      <td>${g.wa}</td>
      <td>${g.status}</td>
      <td>${g.sent ? '✅' : '❌'}</td>
      <td><button class="btn btn-red" style="padding: 4px 8px" onclick="deleteGuest(${g.id})">Hapus</button></td>
    </tr>
  `).join('');
  document.getElementById('s-total').textContent = guests.length;
  document.getElementById('s-sent').textContent = guests.filter(g => g.sent).length;
}

function deleteGuest(id) {
  if(confirm('Hapus tamu?')) {
    guests = guests.filter(g => g.id !== id);
    saveGuests();
    renderGuests();
  }
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  btn.classList.add('active');
  if(tab === 'rsvp') loadRsvpData();
}

function exportCSV() {
  let csv = 'Nama,WhatsApp,Keterangan\n';
  guests.forEach(g => {
    csv += `${g.name},${g.wa},${g.note}\n`;
  });
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = window.URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.setAttribute('href', url);
  a.setAttribute('download', 'daftar_tamu.csv');
  a.click();
}
</script>
</body>
</html>
