<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – Resy & Afif Wedding</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Cormorant+Garamond:wght@300;400;500&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --brown:    #4A2E10; --gold:     #C8972A; --gold-lt:  #E8C06A;
      --cream:    #FAF3E0; --ivory:    #FFF9F0; --red:      #C62828;
      --green:    #2E7D32; --blue:     #1565C0; --text:     #2C1A08;
      --muted:    #7A6A52; --border:   rgba(74,46,16,0.15);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Lato', sans-serif; background: var(--ivory); color: var(--text); min-height: 100vh; }
    header { background: var(--brown); border-bottom: 3px solid var(--gold); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
    .header-title { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--cream); }
    main { max-width: 1100px; margin: 0 auto; padding: 28px 20px; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 28px; }
    .stat-card { background: white; border: 1px solid var(--border); border-radius: 8px; padding: 16px; text-align: center; }
    .stat-num { font-family: 'Playfair Display', serif; font-size: 36px; color: var(--brown); line-height: 1; }
    .stat-num.green { color: var(--green); } .stat-num.red { color: var(--red); } .stat-num.orange { color: #E65100; }
    .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }
    .card { background: white; border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 20px; }
    .card-title { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--brown); margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 10px; align-items: end; }
    .form-input { padding: 9px 12px; border: 1px solid var(--border); border-radius: 5px; font-size: 14px; background: var(--ivory); outline: none; width: 100%; }
    .btn { padding: 9px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; font-weight: 700; transition: all 0.2s; white-space: nowrap; }
    .btn-brown { background: var(--brown); color: var(--cream); }
    .btn-gold { background: var(--gold); color: var(--brown); }
    .btn-green { background: var(--green); color: white; }
    .btn-red { background: #e53935; color: white; }
    .btn-blue { background: var(--blue); color: white; font-size: 12px; padding: 6px 12px; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead tr { background: var(--brown); }
    thead th { color: var(--cream); padding: 10px 12px; text-align: left; font-size: 11px; text-transform: uppercase; }
    tbody td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .badge { display: inline-block; font-size: 11px; padding: 3px 10px; border-radius: 12px; font-weight: 700; }
    .badge-hadir { background: #E8F5E9; color: var(--green); }
    .badge-tidak { background: #FFEBEE; color: var(--red); }
    .badge-belum { background: #FFF8E1; color: #E65100; }
    .tabs { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 20px; }
    .tab { padding: 10px 20px; font-size: 13px; cursor: pointer; border: none; background: none; color: var(--muted); font-weight: 700; border-bottom: 2px solid transparent; margin-bottom: -2px; }
    .tab.active { color: var(--brown); border-bottom-color: var(--gold); }
    .tab-content { display: none; } .tab-content.active { display: block; }
    #login-overlay { position: fixed; inset: 0; background: var(--ivory); z-index: 9999; display: flex; align-items: center; justify-content: center; }
    .login-box { background: white; padding: 40px; border-radius: 12px; width: 100%; max-width: 400px; text-align: center; }
    .hidden { display: none !important; }
    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--brown); color: var(--gold-lt); padding: 10px 20px; border-radius: 8px; opacity: 0; transition: 0.3s; pointer-events: none; z-index: 10000; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<div id="login-overlay">
  <div class="login-box">
    <h2 style="font-family:'Playfair Display'; margin-bottom: 20px;">Admin Login</h2>
    <input type="email" id="login-email" class="form-input" placeholder="Email" style="margin-bottom: 10px;">
    <input type="password" id="login-password" class="form-input" placeholder="Password" style="margin-bottom: 20px;">
    <button class="btn btn-brown" style="width: 100%" onclick="handleLogin()">Masuk</button>
  </div>
</div>

<header>
  <div class="header-title">Resy & Afif - Admin Panel</div>
  <button class="btn btn-red" style="padding: 5px 15px; font-size: 12px;" onclick="handleLogout()">Logout</button>
</header>

<main>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-num" id="s-total">0</div><div class="stat-label">Total Tamu</div></div>
    <div class="stat-card"><div class="stat-num green" id="s-hadir">0</div><div class="stat-label">Hadir</div></div>
    <div class="stat-card"><div class="stat-num red" id="s-tidak">0</div><div class="stat-label">Tidak Hadir</div></div>
    <div class="stat-card"><div class="stat-num orange" id="s-belum">0</div><div class="stat-label">Belum Respon</div></div>
    <div class="stat-card"><div class="stat-num" id="s-sent" style="color:var(--blue)">0</div><div class="stat-label">WA Terkirim</div></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('guests', this)">Daftar Tamu</button>
    <button class="tab" onclick="switchTab('rsvp', this)">Konfirmasi RSVP</button>
    <button class="tab" onclick="switchTab('wishes', this)">Ucapan & Doa</button>
    <button class="tab" onclick="switchTab('settings', this)">Pengaturan</button>
  </div>

  <div id="tab-guests" class="tab-content active">
    <div class="card">
      <div class="card-title">Tambah Tamu</div>
      <div class="form-row">
        <input class="form-input" id="new-name" placeholder="Nama" />
        <input class="form-input" id="new-wa" placeholder="WhatsApp (628...)" />
        <input class="form-input" id="new-note" placeholder="Keterangan" />
        <button class="btn btn-brown" onclick="addGuest()">Tambah</button>
      </div>
      <div style="margin-top: 15px;">
        <input type="file" id="csv-import" accept=".csv" style="display:none" onchange="importCSV(this)">
        <button class="btn btn-gold" style="padding: 5px 15px; font-size: 12px;" onclick="document.getElementById('csv-import').click()">Import CSV</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title" style="display:flex; justify-content:space-between; align-items:center;">
        Daftar Tamu Undangan
        <button class="btn btn-gold" style="padding: 5px 15px; font-size: 12px;" onclick="syncAllData()" id="sync-btn">Sinkronisasi RSVP</button>
      </div>
      
      <div style="display:flex; gap:10px; margin-bottom:15px; flex-wrap: wrap;">
        <input class="form-input" id="search-guest" placeholder="Cari nama tamu..." oninput="renderGuestTable()" style="max-width:300px" />
        <button class="btn btn-green" style="padding: 5px 15px; font-size: 12px;" onclick="sendAllPending()">Kirim Semua WA Belum Terkirim</button>
        <button class="btn btn-blue" style="padding: 5px 15px; font-size: 12px;" onclick="exportCSV()">Export CSV</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>#</th><th>Nama</th><th>WhatsApp</th><th>Keterangan</th><th>RSVP</th><th>Status WA</th><th>Aksi</th></tr>
          </thead>
          <tbody id="guest-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="tab-rsvp" class="tab-content"><div class="card"><div class="card-title">Data Konfirmasi</div><div id="rsvp-admin-list"></div></div></div>
  <div id="tab-wishes" class="tab-content"><div class="card"><div class="card-title">Daftar Ucapan</div><div id="wishes-admin-list"></div></div></div>
  <div id="tab-settings" class="tab-content">
    <div class="card">
      <div class="card-title">Template WhatsApp (Tanpa Emoji)</div>
      <textarea class="form-input" id="wa-template" rows="8"></textarea>
      <button class="btn btn-brown" style="margin-top:12px" onclick="saveTemplate()">Simpan Template</button>
    </div>
    <div class="card"><div class="card-title">URL Undangan</div><input class="form-input" id="base-url" /><button class="btn btn-brown" style="margin-top:10px" onclick="saveBaseUrl()">Simpan URL</button></div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://bijessmsedrtfxbnieza.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_mmiBBx94Ri1-PjFQE6DyHQ_oElTvxJG';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let guests = JSON.parse(localStorage.getItem('wedding_guests') || '[]');

async function handleLogin() {
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
  if (error) alert("Login Gagal"); else { document.getElementById('login-overlay').classList.add('hidden'); checkSession(); }
}
async function handleLogout() { await supabaseClient.auth.signOut(); location.reload(); }
async function checkSession() {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (session) document.getElementById('login-overlay').classList.add('hidden');
}
function saveGuests() { localStorage.setItem('wedding_guests', JSON.stringify(guests)); }
function showToast(m) { const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 2000); }

function renderGuestTable() {
  const searchTerm = document.getElementById('search-guest').value.toLowerCase();
  const filtered = guests.filter(g => g.name.toLowerCase().includes(searchTerm));
  const tbody = document.getElementById('guest-tbody');
  tbody.innerHTML = filtered.map((g, i) => `
    <tr>
      <td>${i+1}</td>
      <td><b>${g.name}</b></td>
      <td style="font-family:monospace">${g.wa || '-'}</td>
      <td>${g.note || '-'}</td>
      <td><span class="badge badge-${g.status}">${g.status.toUpperCase()}</span></td>
      <td>${g.sent ? 'Terkirim' : 'Belum'}</td>
      <td>
        <div style="display:flex; gap:5px;">
          <button class="btn btn-green" style="padding: 4px 8px; font-size: 11px;" onclick="sendWA(${g.id})">Kirim</button>
          <button class="btn btn-red" style="padding: 4px 8px; font-size: 11px;" onclick="deleteGuest(${g.id})">Hapus</button>
        </div>
      </td>
    </tr>
  `).join('');
  updateStats();
}

async function syncAllData() {
  const btn = document.getElementById('sync-btn'); btn.innerHTML = 'Memproses...';
  const { data, error } = await supabaseClient.from('rsvp').select('*');
  if (!error && data) {
    guests.forEach(g => g.status = 'belum');
    data.forEach(rsvp => {
      const idx = guests.findIndex(g => g.name.toLowerCase().trim() === rsvp.name.toLowerCase().trim());
      if (idx !== -1) guests[idx].status = rsvp.status;
    });
    saveGuests(); renderGuestTable(); showToast('RSVP Diperbarui');
  }
  btn.innerHTML = 'Sinkronisasi RSVP';
}

function addGuest() {
  const n = document.getElementById('new-name').value;
  if (!n) return;
  guests.push({ id: Date.now(), name: n, wa: document.getElementById('new-wa').value, note: document.getElementById('new-note').value, status: 'belum', sent: false });
  saveGuests(); renderGuestTable(); document.getElementById('new-name').value = '';
}

function getInviteLink(n) { return (localStorage.getItem('base_url') || 'https://resy-afif.vercel.app') + "?to=" + encodeURIComponent(n); }

function sendWA(id) { 
  const g = guests.find(g => g.id === id); 
  if (!g.wa) return showToast("No WA Kosong");
  const template = localStorage.getItem('wa_template') || "Halo {nama}, ini link undangan: {link}";
  const msg = template.replace(/{nama}/g, g.name).replace(/{link}/g, getInviteLink(g.name));
  window.open(`https://wa.me/${g.wa}?text=${encodeURIComponent(msg)}`, '_blank');
  g.sent = true; saveGuests(); renderGuestTable();
}

function sendAllPending() {
  const pending = guests.filter(g => !g.sent && g.wa);
  if (pending.length === 0) return showToast("Antrean Kosong");
  if (!confirm("Buka " + pending.length + " tab WhatsApp? Pastikan Pop-up diizinkan browser.")) return;
  pending.forEach((g, i) => {
    setTimeout(() => {
      const template = localStorage.getItem('wa_template') || "";
      const msg = template.replace(/{nama}/g, g.name).replace(/{link}/g, getInviteLink(g.name));
      const win = window.open(`https://wa.me/${g.wa}?text=${encodeURIComponent(msg)}`, '_blank');
      if(win) { g.sent = true; if(i === pending.length-1) { saveGuests(); renderGuestTable(); showToast("Selesai!"); } }
    }, i * 3000);
  });
}

function updateStats() {
  document.getElementById('s-total').textContent = guests.length;
  document.getElementById('s-hadir').textContent = guests.filter(g => g.status === 'hadir').length;
  document.getElementById('s-tidak').textContent = guests.filter(g => g.status === 'tidak').length;
  document.getElementById('s-belum').textContent = guests.filter(g => g.status === 'belum').length;
  document.getElementById('s-sent').textContent = guests.filter(g => g.sent).length;
}

function switchTab(name, el) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active'); el.classList.add('active');
  if (name === 'rsvp') loadRsvpList();
  if (name === 'wishes') loadWishesList();
}

async function loadRsvpList() {
  const { data } = await supabaseClient.from('rsvp').select('*').order('created_at', { ascending: false });
  document.getElementById('rsvp-admin-list').innerHTML = (data || []).map(r => `<div style="padding:10px; border-bottom:1px solid var(--border)"><b>${r.name}</b> (${r.status}) - ${r.count} orang</div>`).join('') || 'Kosong';
}
async function loadWishesList() {
  const { data } = await supabaseClient.from('wishes').select('*').order('created_at', { ascending: false });
  document.getElementById('wishes-admin-list').innerHTML = (data || []).map(w => `<div style="padding:10px; border-bottom:1px solid var(--border)"><b>${w.name}</b>: "${w.message || w.ucapan || w.text || '...'}"</div>`).join('') || 'Kosong';
}
function deleteGuest(id) { if(confirm('Hapus?')) { guests = guests.filter(g => g.id !== id); saveGuests(); renderGuestTable(); } }
function saveTemplate() { localStorage.setItem('wa_template', document.getElementById('wa-template').value); showToast('Tersimpan'); }
function saveBaseUrl() { localStorage.setItem('base_url', document.getElementById('base-url').value); showToast('Tersimpan'); }

checkSession(); renderGuestTable();
document.getElementById('wa-template').value = localStorage.getItem('wa_template') || "Assalamu'alaikum, Yth. {nama}, Kami mengundang Anda: {link}";
document.getElementById('base-url').value = localStorage.getItem('base_url') || "https://resy-afif.vercel.app";

function exportCSV() {
  let csv = "Nama,WhatsApp,Keterangan,Status\n";
  guests.forEach(g => { csv += g.name + "," + g.wa + "," + g.note + "," + g.status + "\n"; });
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'tamu.csv'; a.click();
}
function importCSV(input) {
  const reader = new FileReader();
  reader.onload = function() {
    const lines = reader.result.split('\n').slice(1);
    lines.forEach(line => {
      const col = line.split(',');
      if (col[0]) guests.push({ id: Date.now()+Math.random(), name: col[0], wa: col[1], note: col[2], status: 'belum', sent: false });
    });
    saveGuests(); renderGuestTable(); showToast('Berhasil Import');
  };
  reader.readAsText(input.files[0]);
}
</script>
</body>
</html>
